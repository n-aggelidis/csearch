app-id: org.csearch.CSearch
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: run.sh

finish-args:
  # Grafik & Anzeige
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

  # Zugriff auf Dateien
  - --filesystem=home

  # --- INTEGRATIONS-BOOSTER ---
  # Erlaubt den Zugriff auf System-Schriftarten und Icons des Hosts
  - --filesystem=xdg-config/gtk-3.0:ro
  - --filesystem=xdg-config/gtk-4.0:ro
  - --filesystem=xdg-config/kdeglobals:ro

  # Erlaubt native System-Dialoge (Filepicker etc.) via Portals
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Documents

  # Verhindert, dass QT ein festes Design erzwingt
  # Wir lassen das System entscheiden!
  #- --env=QT_QPA_PLATFORMTHEME=kde

modules:
  # 2. Externe Tools (Beispiel: Ripgrep)
  - name: ripgrep
    buildsystem: simple
    build-commands:
      - install -D rg /app/bin/rg
    sources:
      - type: archive
        url: https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz
        sha256: 1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599

  # 3. Ripgrep-all
  - name: ripgrep-all
    buildsystem: simple
    build-commands:
      - install -D rga /app/bin/rga
      - install -D rga-preproc /app/bin/rga-preproc
    sources:
      - type: archive
        url: https://github.com/phiresky/ripgrep-all/releases/download/v0.10.10/ripgrep_all-v0.10.10-x86_64-unknown-linux-musl.tar.gz
        sha256: a969c25b182ac84aa672518313b5f741091decf7d93d03a020bcfe517b9ff4e8

  # 4. Pandoc
  - name: pandoc
    buildsystem: simple
    build-commands:
      - install -D bin/pandoc /app/bin/pandoc
    sources:
      - type: archive
        url: https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-linux-amd64.tar.gz
        sha256: a69abfababda8a56969a254b09f9553a7be89ddec00d4e0fe9fd585d71a67508

  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      # Wir schalten alles ab, was wir nicht brauchen, um den Build rasend schnell zu machen
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_GLIB=OFF
      - -DENABLE_CPP=ON
      - -DBUILD_GTK_TESTS=OFF
      - -DBUILD_QT5_TESTS=OFF
      - -DBUILD_QT6_TESTS=OFF
      - -DBUILD_CPP_TESTS=OFF
      - -DENABLE_UTILS=OFF
      - -DENABLE_BOOST=OFF
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-26.05.0.tar.xz
        sha256: 6fef27ff04f37db43054c86bcdff6128c9fb1f6af4ef3c8b369a7e9abd68d0bb

  # 5. libgpg-error (Zwingende Basis für libgcrypt)
  - name: libgpg-error
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/libgpg-error/libgpg-error-1.61.tar.bz2
        sha256: 7a85413f2bc354f4f8aa832b718af122e48965e9e0eb9012ee659c13c6385c93

  # 6. libgcrypt
  - name: libgcrypt
    buildsystem: autotools
    config-opts:
      - --with-libgpg-error-prefix=/app
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.2.tar.bz2
        sha256: 7ce33c2492221a0436f96a8500215e9f3e3dcb5fd26a757cd415e7a843babd5e
  # 5. Pdfgrep (Extracted from Arch Linux package)
  - name: pdfgrep
    buildsystem: autotools
    config-opts:
      - --with-libgcrypt-prefix=/app
    sources:
      - type: archive
        url: https://pdfgrep.org/download/pdfgrep-2.2.0.tar.gz
        sha256: 0661e531e4c0ef097959aa1c9773796585db39c72c84a02ff87d2c3637c620cb


  # 3. Deine App-Dateien
  - name: csearch
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin/core
      - cp -r src/core/* /app/bin/core/
      - cp -r src/ui/* /app/bin/core/
      - install -D src/main.py /app/bin/main.py
      - install -D assets/icon.svg /app/bin/icon.svg
      - install -D assets/icon.svg /app/share/icons/hicolor/scalable/apps/org.csearch.CSearch.svg
      - install -D flatpak/run.sh /app/bin/run.sh
      - install -D flatpak/org.csearch.CSearch.desktop /app/share/applications/org.csearch.CSearch.desktop
    sources:
      - type: dir
        path: ..
        skip:
          - "__pycache__"
          - "*.pyc"
          - "*.pyo"
          - ".pytest_cache"
          - ".vscode"
          - ".idea"