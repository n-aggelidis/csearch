<svg width="400" height="400" viewBox="55 40 275 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Weißer Hintergrund -->

  <!-- Dokument mit umgeklappter Ecke (als Pfad gezeichnet) -->
  <path d="M 100 66 
           C 100 57.16 107.16 50 116 50
           L 230 50 
           L 280 100 
           L 280 274 
           C 280 282.84 272.84 290 264 290 
           L 116 290 
           C 107.16 290 100 282.84 100 274 
           Z" fill="#F4F6F8" stroke="#3A4047" stroke-width="12" stroke-linejoin="round"/>

  <!-- Umgeklappte Ecke (helleres Grau zur Abhebung) -->
  <path d="M 230 50 L 230 84 C 230 92.84 237.16 100 246 100 L 280 100 Z" fill="#D9E0E8" stroke="#3A4047" stroke-width="12" stroke-linejoin="round"/>

  <!-- Graue Textlinien auf dem Dokument -->
  <line x1="135" y1="120" x2="245" y2="120" stroke="#B0B8C1" stroke-width="8" stroke-linecap="round" />
  <line x1="135" y1="150" x2="245" y2="150" stroke="#B0B8C1" stroke-width="8" stroke-linecap="round" />
  <line x1="135" y1="180" x2="190" y2="180" stroke="#B0B8C1" stroke-width="8" stroke-linecap="round" />
  <line x1="135" y1="210" x2="190" y2="210" stroke="#B0B8C1" stroke-width="8" stroke-linecap="round" />

  <!-- Lupe -->
  <!-- Griff und Verbindungsstück gedreht für einen natürlichen Winkel -->
  <g transform="translate(230, 220) rotate(315)">
    <!-- Griff (abgerundetes Rechteck) -->
    <rect x="-15" y="0" width="30" height="95" rx="15" fill="#303030" />
    <!-- Verbindungsstück (Orange) -->
    <rect x="-10" y="-15" width="20" height="20" fill="#FF6B00" />
  </g>

  <!-- Lupe: Glas/Rahmen (Orange) -->
  <circle cx="205" cy="195" r="50" fill="#FFFFFF" stroke="#FF6B00" stroke-width="16" />
  <circle cx="205" cy="195" r="58" fill="none" stroke="#303030" stroke-width="3" />
  <circle cx="205" cy="195" r="42" fill="none" stroke="#303030" stroke-width="3" />

  <!-- Vergrößerter Text in der Lupe (Orange) -->
  <line x1="175" y1="180" x2="235" y2="180" stroke="#FF6B00" stroke-width="8" stroke-linecap="round" />
  <line x1="175" y1="205" x2="215" y2="205" stroke="#FF6B00" stroke-width="8" stroke-linecap="round" />
</svg>
